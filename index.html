<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA Coptic League 2026 Standings</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #c9b5a5; min-height: 100vh; }
.header { background: #7d1a1a; padding: 16px 20px 0; text-align: center; }
.header .sub { font-size: 0.65rem; color: #e07878; letter-spacing: 0.18em; text-transform: uppercase; }
.header h1 { font-family: Georgia, serif; font-size: 1.3rem; color: #fff; font-weight: 700; margin-bottom: 14px; }
.tabs { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; }
.tab { padding: 8px 14px; border: none; cursor: pointer; font-weight: 700; font-size: 0.76rem;
  background: transparent; color: #e07878; border-radius: 6px 6px 0 0; white-space: nowrap; transition: all 0.15s; }
.tab.active { background: #fff; color: #7d1a1a; }
.main { max-width: 700px; margin: 0 auto; padding: 20px 14px 48px; }
.statusbar { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-bottom: 14px; }
.statusbar .err { font-size: 0.72rem; color: #c0392b; font-weight: 700; }
.statusbar .ts  { font-size: 0.68rem; color: #888; }
.btn-refresh { padding: 5px 12px; background: #7d1a1a; color: #fff; border: none;
  border-radius: 5px; font-weight: 700; font-size: 0.72rem; cursor: pointer; }
.btn-refresh:disabled { opacity: 0.6; }
.card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(80,20,20,.13); overflow: hidden; }
.card-head { background: #7d1a1a; padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; }
.card-head span { color: #fff; font-family: Georgia, serif; font-weight: 700; font-size: 0.95rem; }
.card-head small { color: #e07878; font-size: 0.68rem; letter-spacing: 0.1em; }
table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
thead tr { background: #f5ede6; border-bottom: 2px solid #c9b5a5; }
th { padding: 9px 10px; text-align: center; color: #5c1010; font-weight: 700; font-size: 0.68rem;
  letter-spacing: 0.09em; text-transform: uppercase; min-width: 38px; }
th:first-child { text-align: left; padding-left: 14px; min-width: 130px; }
td { padding: 10px 10px; text-align: center; color: #222; }
td:first-child { text-align: left; padding-left: 14px; font-weight: 700; white-space: nowrap; }
tr:nth-child(even) { background: #faf4ef; }
tr { border-bottom: 1px solid #ede0d8; }
.rank { display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%; background: transparent;
  border: 2px solid #7d1a1a; color: #7d1a1a; font-size: 0.65rem; font-weight: 800; margin-right: 8px; }
.pts { color: #7d1a1a; font-weight: 800; }
.pd-pos { color: #1a7d2a; font-weight: 700; }
.pd-neg { color: #7d1a1a; font-weight: 700; }
.pd-zero { color: #888; font-weight: 700; }
.card-foot { padding: 7px 14px; background: #f5ede6; font-size: 0.65rem; color: #888; border-top: 1px solid #c9b5a5; }
.autotxt { text-align: center; margin-top: 14px; font-size: 0.7rem; color: #888; }
</style>
</head>
<body>

<div class="header">
  <div class="sub">NA Coptic League</div>
  <h1>2026 Regular Season Standings</h1>
  <div class="tabs" id="tabs"></div>
</div>

<div class="main">
  <div class="statusbar">
    <span class="err" id="err"></span>
    <span class="ts" id="ts"></span>
    <button class="btn-refresh" id="btnRefresh" onclick="fetchSheet()">↻ Refresh</button>
  </div>
  <div class="card">
    <div class="card-head">
      <span id="divLabel">HS – NY Division</span>
      <small>REGULAR SEASON</small>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Team</th>
            <th>W</th><th>L</th><th>T</th><th>PTS</th><th>PF</th><th>PA</th><th>PD</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="card-foot">Tiebreakers: Win % → Wins → Point Diff → Points For → Points Against → Losses &nbsp;·&nbsp; Win = 2 pts</div>
  </div>
  <div class="autotxt" id="autoTxt"></div>
</div>

<script>
var SHEET_URL = ""; // ← paste your Google Sheets CSV URL here

var TEAMS = {
  "HS-NY":  ["Astoria","BK 1","BK 2","LI 1","LI 2","Queens","SI 1 1","SI 1 2","SI 2 1","SI 2 2"],
  "HS-NJ":  ["Bayonne SASA 1","Bayonne SASA 2","Bayonne VMSJ 1","Bayonne VMSJ 2","Belleville","EB 1","EB 2","EB 3","Holmdel","Makkar","Philly","Piscataway","Upstate Paramus","Westside"],
  "Girls":  ["Astoria","Bayonne SASA","Belleville","BK","EB 1","EB 2","Holmdel","Makkar","Queens","SI 1","SI 2","SI 3","Upstate"],
  "JHS":    ["Astoria","Bayonne SASA","Bayonne VMSJ","EB 1","EB 2","Holmdel","Makkar","Philadelphia","Queens","SI 1","SI 2","Summit","Westside"],
  "College":["Astoria","Bayonne SASA","Bayonne VMSJ","BK","EB 1","EB 2","EB 3","Holmdel","LI","Philly","Piscataway","Queens","SI 1","SI 2","Upstate"],
  "Mens":   ["Bayonne SASA","EB","Hatfield","Holmdel","LI","SI 1","SI 2","Summit"]
};
var DIVS = ["HS-NY","HS-NJ","JHS","Girls","College","Mens"];
var DIV_LABELS = {"HS-NY":"HS – NY","HS-NJ":"HS – NJ","JHS":"JHS","Girls":"Girls","College":"College","Mens":"Mens"};

var activeDiv = "HS-NY";
var allRows = [];

// Build tabs
var tabsEl = document.getElementById("tabs");
DIVS.forEach(function(d) {
  var btn = document.createElement("button");
  btn.className = "tab" + (d === activeDiv ? " active" : "");
  btn.textContent = DIV_LABELS[d];
  btn.onclick = function() {
    activeDiv = d;
    document.querySelectorAll(".tab").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    document.getElementById("divLabel").textContent = DIV_LABELS[d] + " Division";
    renderStandings();
  };
  tabsEl.appendChild(btn);
});

function parseCSV(text) {
  var lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
  if (lines.length < 2) return [];
  function splitLine(line) {
    var vals = [], cur = "", inQ = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim().replace(/^"|"$/g,"")); cur = ""; }
      else cur += c;
    }
    vals.push(cur.trim().replace(/^"|"$/g,""));
    return vals;
  }
  var headers = splitLine(lines[0]);
  return lines.slice(1).map(function(l) {
    var v = splitLine(l), o = {};
    headers.forEach(function(h,i){ o[h] = v[i] || ""; });
    return o;
  }).filter(function(r){ return Object.values(r).some(function(v){ return v; }); });
}

function findCol(row) {
  var names = Array.prototype.slice.call(arguments, 1);
  var keys = Object.keys(row);
  for (var i = 0; i < keys.length; i++) {
    var kl = keys[i].toLowerCase().replace(/[^a-z0-9]/g,"");
    for (var j = 0; j < names.length; j++) {
      if (kl.includes(names[j].toLowerCase().replace(/[^a-z0-9]/g,""))) return row[keys[i]];
    }
  }
  return "";
}

function parseScore(s) {
  var m = String(s||"").match(/(\d+)\s*[-–:]\s*(\d+)/);
  return m ? [parseInt(m[1]), parseInt(m[2])] : null;
}

function calcStandings(div, rows) {
  var stats = {};
  (TEAMS[div]||[]).forEach(function(t){ stats[t]={team:t,w:0,l:0,tie:0,pf:0,pa:0,gp:0}; });
  rows.forEach(function(r) {
    var rowDiv = findCol(r,"division").trim();
    if (rowDiv !== div && rowDiv !== DIV_LABELS[div]) return;
    var winner = findCol(r,"winningteam","winning team","winner").trim();
    var loser  = findCol(r,"losingteam","losing team","loser").trim();
    var sc = parseScore(findCol(r,"finalscore","final score","score").trim());
    if (!winner || !loser) return;
    if (!stats[winner]) stats[winner]={team:winner,w:0,l:0,tie:0,pf:0,pa:0,gp:0};
    if (!stats[loser])  stats[loser]= {team:loser, w:0,l:0,tie:0,pf:0,pa:0,gp:0};
    if (winner !== loser) {
      stats[winner].w++; stats[winner].gp++;
      stats[loser].l++;  stats[loser].gp++;
      if (sc) { stats[winner].pf+=sc[0]; stats[winner].pa+=sc[1]; stats[loser].pf+=sc[1]; stats[loser].pa+=sc[0]; }
    } else {
      stats[winner].tie++; stats[winner].gp++;
      if (sc) { stats[winner].pf+=sc[0]; stats[winner].pa+=sc[1]; }
    }
  });
  return Object.values(stats).sort(function(a,b){
    var gpA=a.w+a.l+a.tie, gpB=b.w+b.l+b.tie;
    var pA=gpA?a.w/gpA:0, pB=gpB?b.w/gpB:0;
    if (pB!==pA) return pB-pA;
    if (b.w!==a.w) return b.w-a.w;
    var pdA=a.pf-a.pa, pdB=b.pf-b.pa;
    if (pdB!==pdA) return pdB-pdA;
    if (b.pf!==a.pf) return b.pf-a.pf;
    if (a.pa!==b.pa) return a.pa-b.pa;
    return a.l-b.l;
  });
}

function renderStandings() {
  var tbody = document.getElementById("tbody");
  var standings = calcStandings(activeDiv, allRows);
  tbody.innerHTML = standings.map(function(t, i) {
    var pts = t.w * 2, pd = t.pf - t.pa;
    var pdClass = pd > 0 ? "pd-pos" : pd < 0 ? "pd-neg" : "pd-zero";
    var pdStr = pd > 0 ? "+" + pd : pd;
    return '<tr>' +
      '<td><span class="rank">' + (i+1) + '</span>' + t.team + '</td>' +
      '<td>' + t.w + '</td><td>' + t.l + '</td><td>' + t.tie + '</td>' +
      '<td class="pts">' + pts + '</td>' +
      '<td>' + t.pf + '</td><td>' + t.pa + '</td>' +
      '<td class="' + pdClass + '">' + pdStr + '</td>' +
      '</tr>';
  }).join("");
}

async function fetchSheet() {
  if (!SHEET_URL) { renderStandings(); return; }
  var btn = document.getElementById("btnRefresh");
  btn.disabled = true; btn.textContent = "…";
  document.getElementById("err").textContent = "";
  try {
    var res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error();
    allRows = parseCSV(await res.text());
    var now = new Date();
    document.getElementById("ts").textContent =
      "Updated " + now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    document.getElementById("autoTxt").textContent = "Standings auto-refresh every 60 seconds";
  } catch(e) {
    document.getElementById("err").textContent = "⚠️ Could not load data.";
  }
  btn.disabled = false; btn.textContent = "↻ Refresh";
  renderStandings();
}

// Init
renderStandings();
if (SHEET_URL) {
  fetchSheet();
  setInterval(fetchSheet, 60000);
} else {
  document.getElementById("btnRefresh").style.display = "none";
}
</script>
</body>
</html>
